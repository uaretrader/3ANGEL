<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMC APEX v17.4.0 | URTRADER TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg: #010101; --accent: #00ffaa; --gold: #ffcc00; --danger: #ff4757; --blue: #00d4ff; 
            --purple: #aa66ff; --orange: #ff884d; --border: rgba(0, 255, 170, 0.2); 
            --silver-bright: #e0e0e0; --silver-medium: #c0c0c0; --silver-dark: #a9a9a9; 
            --gold-dim: rgba(255, 204, 0, 0.12); --card-bg: #050505;
            --highlight-bull: #00cc88; --highlight-bear: #ff8866; --highlight-neutral: #aaaaaa;
        }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--silver-bright); 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
            position: fixed; top: 0; left: 0; 
        }
        
        .app-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .terminal-container { width: 100%; background: var(--bg); position: relative; z-index: 10; flex-shrink: 0; }
        
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; flex-wrap: wrap; gap: 10px; }
        .brand-container { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .brand { font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; color: var(--accent); text-align: left; }
        .meta-label-sub { font-size: 0.55rem; color: var(--silver-dark); letter-spacing: 3px; font-family: 'JetBrains Mono'; font-weight: 800; text-align: left; }
        
        #sys-status { 
            font-family: 'JetBrains Mono'; 
            font-size: 0.65rem; 
            font-weight: 800; 
            border-left: 2px solid var(--gold); 
            padding-left: 8px; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .ws-status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .ws-status-dot.live { 
            background: var(--accent); 
            box-shadow: 0 0 8px var(--accent);
            animation: pulseLive 1s ease infinite;
        }
        .ws-status-dot.reconnect { 
            background: var(--orange); 
            animation: pulseReconnect 0.8s ease infinite;
        }
        .ws-status-dot.offline { 
            background: var(--danger); 
            animation: none;
            box-shadow: none;
        }
        .ws-status-dot.fallback { 
            background: var(--blue); 
            animation: pulseFallback 1s ease infinite;
        }
        @keyframes pulseFallback {
            0%, 100% { opacity: 1; transform: scale(1); background: var(--blue); }
            50% { opacity: 0.6; transform: scale(0.9); background: #00aaff; }
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.6; transform: scale(0.9); box-shadow: 0 0 4px var(--accent); }
        }
        @keyframes pulseReconnect {
            0%, 100% { opacity: 1; transform: scale(1); background: var(--orange); }
            50% { opacity: 0.5; transform: scale(0.85); background: #ffaa66; }
        }
        
        .nav-section { display: flex; gap: 12px; padding: 12px 16px; justify-content: space-between; flex-wrap: wrap; background: #000; align-items: center; }
        .nav-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-tab { 
            background: transparent;

            padding: 7px 14px; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            cursor: pointer; 
            font-family: 'JetBrains Mono'; 
            transition: 0.2s; 
            letter-spacing: 0.3px;
        }
        .btn-tab.active {

        .btn-tab:hover:not(.disabled) {

            background: rgba(0, 255, 170, 0.05);
        }

        .hero-meta-row {

            gap: 10px;

            margin-bottom: 16px;
            font-family: 'JetBrains Mono';

        .adx-bar { height: 100%; width: 0%; background: var(--silver-medium); transition: width 0.3s ease, background 0.3s ease; border-radius: 4px; }

        .card { background: var(--card-bg); border: 1px solid #151515; border-radius: 12px; padding: 12px; backdrop-filter: blur(2px); }

            justify-content: flex-start;

        .session-module-new { color: var(--gold); }

        .copied { color: #fff !important; text-shadow: 0 0 8px var(--accent); transition: 0.1s; }

        .decision-animate {

        .arrow-pulse {

        @media (max-width: 480px) {
            .data-item-swing-left { padding-left: 10px; }

            .header { padding: 12px 12px; }
            .nav-section { padding: 12px 12px; }
            .decision-panel { padding: 6px 12px; gap: 10px; }
            .direction-arrow { font-size: 1.2rem; min-width: 32px; }

            .adx-value { min-width: 28px; }
            .ema34-value { min-width: 50px; }
        }
    </style>
</head>

<script>
    // ==================== KONFIGURASI & STATE ====================
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsConnection = null;
    let lastPrice = 0;
    let candleData = [];
    let isReloading = false;
    let reconnectTimer = null;
    let periodicInterval = null;
    let stuckCheckInterval = null;
    let heartbeatInterval = null;
    let restFallbackInterval = null;
    let wsMonitorInterval = null;
    let isManualDisconnect = false;
    let reconnectDelay = 1000;
    let lastStructureUpdateTime = 0;
    let lastDecision = "";
    let lastArrowDirection = "";
    let lastUIElementsUpdate = 0;
    let recentPrices = [];
    let lastDecisionPrice = 0;
    let lastWSMessageTime = Date.now();
    let isUsingFallback = false;
    const UI_UPDATE_INTERVAL = 100;
    const THROTTLE_MINUTES = 2;
    
    // ==================== SIGNAL COOLDOWN SYSTEM ====================
    let lastSignalExpiry = 0;
    let lastSignalDecision = "";
    let lastSignalTime = 0;
    
    // MTF Background Data dengan analisis lebih akurat
    let mtfAnalysisCache = { 
        m5: { bias: "NEUTRAL", strength: 0, ema50: 0, ema200: 0, macd: 0 },
        m15: { bias: "NEUTRAL", strength: 0, ema50: 0, ema200: 0, macd: 0 },
        h1: { bias: "NEUTRAL", strength: 0, ema50: 0, ema200: 0, macd: 0 }
    };
    
    // ==================== THROTTLE SYSTEM ====================
    const throttleMap = new Map();
    
    function isThrottled(pair, timeframe) {
        const key = `${pair}_${timeframe}`;
        const now = Date.now();
        const lastSignal = throttleMap.get(key) || 0;
        const remaining = THROTTLE_MINUTES * 60 * 1000 - (now - lastSignal);
        if (remaining > 0) {
            return { throttled: true, remaining: Math.ceil(remaining / 1000) };
        }
        return { throttled: false, remaining: 0 };
    }
    
    function updateThrottle(pair, timeframe) {
        const key = `${pair}_${timeframe}`;
        throttleMap.set(key, Date.now());
    }
    
    // ==================== ATR CALCULATION ====================
    let cachedATR = 0;
    let lastATRCalc = 0;
    
    function calculateATR(period = 14, data = candleData) {
        const now = Date.now();
        if (now - lastATRCalc < 5000 && cachedATR > 0) return cachedATR;
        
        if (!data.length || data.length < period + 1) return 0;
        let tr = [];
        for (let i = 1; i < data.length; i++) {
            const high = data[i].h;
            const low = data[i].l;
            const prevClose = data[i-1].c;
            const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
            tr.push(trueRange);
        }
        cachedATR = tr.slice(-period).reduce((a, b) => a + b, 0) / period;
        lastATRCalc = now;
        return cachedATR;
    }
    
    // ==================== EMA CALCULATION ====================
    function calculateEMA(data, period) {
        if (!data.length || data.length < period) return 0;
        const multiplier = 2 / (period + 1);
        let ema = data[0].c;
        for (let i = 1; i < data.length; i++) {
            ema = (data[i].c - ema) * multiplier + ema;
        }
        return ema;
    }
    
    // ==================== MACD CALCULATION ====================
    function calculateMACD(data) {
        if (!data.length || data.length < 26) return 0;
        
        const ema12 = calculateEMA(data, 12);
        const ema26 = calculateEMA(data, 26);
        const macdLine = ema12 - ema26;
        
        let macdValues = [];
        for (let i = 25; i < data.length; i++) {
            const slice = data.slice(0, i + 1);
            const e12 = calculateEMA(slice, 12);
            const e26 = calculateEMA(slice, 26);
            macdValues.push(e12 - e26);
        }
        
        if (macdValues.length < 9) return macdLine;
        
        let signalLine = 0;
        const signalMultiplier = 2 / (9 + 1);
        signalLine = macdValues[0];
        for (let i = 1; i < macdValues.length; i++) {
            signalLine = (macdValues[i] - signalLine) * signalMultiplier + signalLine;
        }
        
        return macdLine - signalLine;
    }

    function detectCandleImbalance(data) {
        if (!data.length || data.length < 3) return null;
        const lastThree = data.slice(-3);
        
        for (let i = 0; i < lastThree.length - 1; i++) {
            const curr = lastThree[i];
            const next = lastThree[i + 1];
            const gapUp = next.l > curr.h;
            const gapDown = next.h < curr.l;
            
            if (gapUp) return { type: "BULLISH", price: curr.h };
            if (gapDown) return { type: "BEARISH", price: curr.l };
        }
        return null;
    }
    
    function getFVGMitigationDepthAdvanced(swingHigh, swingLow, currentPrice, candleData) {
        const imbalance = detectCandleImbalance(candleData);
        if (!imbalance) {
            const range = swingHigh - swingLow;
            if (range <= 0) return 50;
            const depth = ((currentPrice - swingLow) / range) * 100;
            return Math.min(100, Math.max(0, depth));
        }
        
        const distanceToImbalance = Math.abs(currentPrice - imbalance.price);
        const maxDistance = (swingHigh - swingLow) * 0.15;
        const mitigation = Math.min(100, Math.max(0, (1 - distanceToImbalance / maxDistance) * 100));
        
        return imbalance.type === "BULLISH" ? mitigation : 100 - mitigation;
    }

    }

    function detectFractalSwingPoints(data, lookback = 5) {
        if (!data || data.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        let swingHigh = 0;
        let swingLow = Infinity;
        
        for (let i = lookback; i < data.length - lookback; i++) {
            const currentHigh = data[i].h;
            const currentLow = data[i].l;
            
            let isSwingHigh = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].h >= currentHigh) {
                    isSwingHigh = false;
                    break;
                }
            }
            
            let isSwingLow = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].l <= currentLow) {
                    isSwingLow = false;
                    break;
                }
            }
            
            if (isSwingHigh && currentHigh > swingHigh) swingHigh = currentHigh;
            if (isSwingLow && currentLow < swingLow) swingLow = currentLow;
        }
        
        if (swingHigh === 0) swingHigh = Math.max(...data.map(c => c.h));
        if (swingLow === Infinity) swingLow = Math.min(...data.map(c => c.l));
        
        return { swingHigh, swingLow };
    }
    
    function detectSwingPointsWithMinRange(data, lookback = 5) {
        let fractalPoints = detectFractalSwingPoints(data, lookback);
        let swingHigh = fractalPoints.swingHigh;
        let swingLow = fractalPoints.swingLow;
        
        let minRange;
        if (currentPair === "XAUUSDT") {
            switch(currentTF) {
                case "5m": minRange = 2.5; break;
                case "15m": minRange = 5.0; break;
                case "1h": minRange = 8.0; break;
                default: minRange = 5.0;
            }
        } else {
            switch(currentTF) {
                case "5m": minRange = 250; break;
                case "15m": minRange = 500; break;
                case "1h": minRange = 800; break;
                default: minRange = 500;
            }
        }
        
        let range = swingHigh - swingLow;
        
        if (range < minRange && data.length > lookback * 4) {
            const extendedLookback = Math.min(lookback * 2, 10);
            const extendedSlice = data.slice(-Math.min(data.length, Math.floor(data.length * 1.5)));
            const extendedPoints = detectFractalSwingPoints(extendedSlice, extendedLookback);
            
            const extendedRange = extendedPoints.swingHigh - extendedPoints.swingLow;
            if (extendedRange > range && extendedRange >= minRange) {
                swingHigh = extendedPoints.swingHigh;
                swingLow = extendedPoints.swingLow;
            }
        }
        
        return { swingHigh, swingLow, range: swingHigh - swingLow };
    }
    
    let cachedADX = 25;
    let lastADXCalc = 0;
    
    function calculateADXWithTick(currentPrice) {
        const now = Date.now();
        if (now - lastADXCalc < 2000) return cachedADX;
        
        if (!candleData.length || candleData.length < 28) return 25;
        try {
            const period = 14;
            const data = [...candleData];
            if (data.length < period + 1) return 25;
            
            let tr = [], plusDM = [], minusDM = [];
            
            for (let i = 1; i < data.length; i++) {
                const high = data[i].h, low = data[i].l;
                const prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                tr.push(trueRange);
                
                const upMove = high - prevHigh;
                const downMove = prevLow - low;
                
                if (upMove > downMove && upMove > 0) {
                    plusDM.push(upMove);
                    minusDM.push(0);
                } else if (downMove > upMove && downMove > 0) {
                    plusDM.push(0);
                    minusDM.push(downMove);
                } else {
                    plusDM.push(0);
                    minusDM.push(0);
                }
            }
            
            const lastCandle = data[data.length - 1];
            const currentHigh = Math.max(lastCandle.h, currentPrice);
            const currentLow = Math.min(lastCandle.l, currentPrice);
            const prevClose = lastCandle.c;
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            
            const tickUpMove = currentHigh - lastCandle.h;
            const tickDownMove = lastCandle.l - currentLow;
            if (tickUpMove > tickDownMove && tickUpMove > 0) {
                plusDM.push(tickUpMove);
                minusDM.push(0);
            } else if (tickDownMove > tickUpMove && tickDownMove > 0) {
                plusDM.push(0);
                minusDM.push(tickDownMove);
            } else {
                plusDM.push(0);
                minusDM.push(0);
            }
            
            if (tr.length < period) return 25;
            
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            
            smoothedTR /= period;
            smoothedPlusDM /= period;
            smoothedMinusDM /= period;
            
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            
            updateDIValues(plusDI, minusDI);
            
            cachedADX = Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
            lastADXCalc = now;
            return cachedADX;
        } catch (error) { console.error("ADX Error:", error); return 25; }
    }
    
    function computeRSI(currentPrice) {
        if (!candleData.length || candleData.length < 20) return 50;
        
        const period = 14;
        let closes = candleData.map(c => c.c);
        
        if (closes.length > 0 && currentPrice !== closes[closes.length - 1]) {
            closes.push(currentPrice);
        }
        
        if (closes.length < period + 1) return 50;
        
        let gains = [], losses = [];
        
        for (let i = 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff >= 0) {
                gains.push(diff);
                losses.push(0);
            } else {
                gains.push(0);
                losses.push(Math.abs(diff));
            }
        }
        
        let avgGain = 0, avgLoss = 0;
        
        for (let i = 0; i < period; i++) {
            avgGain += gains[i];
            avgLoss += losses[i];
        }
        
        avgGain /= period;
        avgLoss /= period;
        
        for (let i = period; i < gains.length; i++) {
            avgGain = ((avgGain * (period - 1)) + gains[i]) / period;
            avgLoss = ((avgLoss * (period - 1)) + losses[i]) / period;
        }
        
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return Math.min(100, Math.max(0, 100 - (100 / (1 + rs))));
    }
    
    function calculateEMA34() {
        if (!candleData.length || candleData.length < 34) return null;
        const period = 34;
        const multiplier = 2 / (period + 1);
        let ema = candleData[0].c;
        for (let i = 1; i < candleData.length; i++) {
            ema = (candleData[i].c - ema) * multiplier + ema;
        }
        return ema;
    }
    
    function detectLiquiditySweep(price) {
        if (!engine.swingHigh || !engine.swingLow) return false;
        const buffer = getSweepBuffer();
        const cooldown = getSweepCooldown();
        const now = Date.now();
        
        if (price > engine.swingHigh + buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "SELL"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        } else if (price < engine.swingLow - buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "BUY"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        }
        return false;
    }
    
    function confirmBOS(currentPrice) {
        if (!engine.sweepDetected || engine.bosConfirmed) return false;
        const now = Date.now();
        if (engine.liquiditySide === "BUY" && currentPrice > engine.swingHigh) {
            engine.bosConfirmed = true; engine.bias = "BULLISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;
            highlightFVGEntry();
            return true;
        } else if (engine.liquiditySide === "SELL" && currentPrice < engine.swingLow) {
            engine.bosConfirmed = true; engine.bias = "BEARISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;
            highlightFVGEntry();
            return true;
        }
        return false;
    }

        if (engine.swingHigh !== engine.lastSwingHigh || engine.swingLow !== engine.lastSwingLow) {
            if (engine.sweepDetected && !engine.bosConfirmed) {
                engine.sweepDetected = false; engine.liquiditySide = null; engine.fvgEntryActive = false;

        // CEK APAKAH MASIH DALAM MASA COOLDOWN SINYAL TERAKHIR

        const entryZoneLow = Math.min(engine.f618, engine.deep);
        const entryZoneHigh = Math.max(engine.f618, engine.deep);
        const isPriceInZone = currentPrice >= entryZoneLow && currentPrice <= entryZoneHigh;
        
        const isSweepActive = engine.sweepDetected && !engine.bosConfirmed;
        const isBOSConfirmed = engine.bosConfirmed && engine.fvgEntryActive;

        const m15Bullish = mtfAnalysisCache.m15.bias === "BULLISH";
        const h1Bullish = mtfAnalysisCache.h1.bias === "BULLISH";
        const m5Bearish = mtfAnalysisCache.m5.bias === "BEARISH";
        const m15Bearish = mtfAnalysisCache.m15.bias === "BEARISH";
        const h1Bearish = mtfAnalysisCache.h1.bias === "BEARISH";
        
        const bullishCount = (m5Bullish ? 1 : 0) + (m15Bullish ? 1 : 0) + (h1Bullish ? 1 : 0);
        const bearishCount = (m5Bearish ? 1 : 0) + (m15Bearish ? 1 : 0) + (h1Bearish ? 1 : 0);
        
        const isMTFBullish = bullishCount >= 2;
        const isMTFBearish = bearishCount >= 2;
        const isMTFStrong = bullishCount >= 3 || bearishCount >= 3;
        
        const isAboveEMA = currentPrice > engine.ema34;
        const isBelowEMA = currentPrice < engine.ema34;
        
        const priceChange = Math.abs(currentPrice - (lastDecisionPrice || currentPrice));
        const hasSignificantMove = currentPair === "XAUUSDT" ? priceChange > 0.3 : priceChange > 30;
        lastDecisionPrice = currentPrice;
        
        let decision = "";
        let decisionColor = "";
        let decisionBg = "";
        let shouldAnimate = false;

        // ==================== URUTAN PRIORITAS BARU (BERDASARKAN BACKTEST) ====================
        // PRIORITAS 1: MTF STRONG CONFLUENCE (3/3) - Win Rate 88%
        if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isMTFStrong && !isBearishBias) {
            isSignalAllowed = true;
            decision = "✅ BUY NOW! 🔥 (MTF STRONG)";
            decisionColor = "var(--accent)";
            decisionBg = "rgba(0, 255, 170, 0.28)";

        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isMTFBullish && !isBearishBias) {

        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isAboveEMA && !isBearishBias && engine.adx > 25) {

        else if (isRanging && !hasSignificantMove) {
            decision = "⏳ WAIT (LOW VOLATILITY)";
            decisionColor = "var(--silver-dark)";
            decisionBg = "rgba(170, 170, 170, 0.1)";

        else if (isPriceInZone && (isTrendStrong || hasSignificantMove) && !isSweepActive && !isBOSConfirmed) {
            decision = "⏳ WAITING SWEEP...";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.1)";
        }
        else {
            decision = "⏸ NO SETUP";
            decisionColor = "var(--silver-dark)";
            decisionBg = "rgba(170, 170, 170, 0.05)";
        }
        
        // FVG VALIDATION
        if (isSignalAllowed) {
            if (!isFVGReadyBool) {
                const fvgNeeded = 30;
                const currentFVG = (decision.includes("BUY") || isBullishBias) ? fvgDepth : (100 - fvgDepth);
                decision = `⏳ FVG: ${Math.round(currentFVG)}%/${fvgNeeded}%`;
                decisionColor = "var(--orange)";
                decisionBg = "rgba(255, 136, 77, 0.15)";
                isSignalAllowed = false;
                shouldAnimate = false;
            }
        }
        
        // JIKA SINYAL VALID, AKTIFKAN COOLDOWN
        if (isSignalAllowed) {
            lastSignalExpiry = now + (THROTTLE_MINUTES * 60 * 1000);

        // TAMPILKAN DECISION NON-SINYAL

        decisionElem.style.color = decisionColor;

            decisionElem.classList.add('decision-animate');
            setTimeout(() => {
                if (decisionElem) decisionElem.classList.remove('decision-animate');
            }, 600);
        }
    }

    function calculateSMCLevels() {
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = getLookback();
        const fractalLookback = getFractalLookback();
        
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const swingPoints = detectSwingPointsWithMinRange(slice, fractalLookback);
        
        let swingHigh = swingPoints.swingHigh;
        let swingLow = swingPoints.swingLow;
        
        const lastCandle = candleData[candleData.length - 1];
        const currentPrice = lastPrice > 0 ? lastPrice : lastCandle.c;
        const range = swingHigh - swingLow;
        
        if (range <= 0) return;
        
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        resetSweepIfStructureChanged();
        
        if (!engine.bosConfirmed) { 
            engine.bias = currentPrice > (swingHigh + swingLow) / 2 ? "BULLISH" : "BEARISH"; 
        }
        
        const isBullish = engine.bosConfirmed ? engine.bias === "BULLISH_BOS" : engine.bias === "BULLISH";
        
        if (isBullish) {
            engine.f618 = swingLow + (range * 0.618);
            engine.deep = swingLow + (range * 0.79);
            engine.tp = swingHigh + (range * 0.23);
        } else {
            engine.f618 = swingHigh - (range * 0.618);
            engine.deep = swingHigh - (range * 0.79);
            engine.tp = swingLow - (range * 0.23);
        }
        
        updateSwingUI(); 
        updateFinalDecision();
    }

    function initWebSocket() {
        cleanupWebSocket();
        updateWSStatus('connecting', 'CONNECTING');
        
        const wsUrl = `wss://fstream.binance.com/ws/${currentPair.toLowerCase()}@aggTrade`;
        wsConnection = new WebSocket(wsUrl);
        
        wsConnection.onopen = () => {
            console.log(`✅ WebSocket connected: ${currentPair}`);
            reconnectDelay = 1000;
            lastWSMessageTime = Date.now();
            updateWSStatus('live', 'LIVE');
        };
        
        wsConnection.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.p && !isReloading) {
                    const tradePrice = parseFloat(msg.p);
                    lastWSMessageTime = Date.now();
                    calculateSMCLevels(); 
                    detectLiquiditySweep(tradePrice); 
                    confirmBOS(tradePrice); 
                    updateUI(tradePrice);
                }
            } catch (err) { console.warn("WS message error:", err); }
        };
        
        wsConnection.onclose = (event) => {
            console.log(`WebSocket closed: ${currentPair}, code: ${event.code}`);
            if (!isManualDisconnect && !isReloading) {
                updateWSStatus('reconnect', 'RECONNECT');
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    if (!isReloading && !isManualDisconnect) {
                        reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
                        initWebSocket();
                    }
                }, reconnectDelay);
            }
        };
        
        wsConnection.onerror = (error) => {
            console.warn(`WebSocket error: ${currentPair}`, error);
            if (!isManualDisconnect && !isReloading) updateWSStatus('reconnect', 'ERROR');
        };
    }

        else { 
            const el = document.getElementById(id); 
            if (el) textToCopy = el.innerText; 
        }
        if (!textToCopy) return;
        navigator.clipboard.writeText(textToCopy);
        const targetElem = document.getElementById(id);
        if (targetElem) { 
            targetElem.classList.add('copied'); 
            setTimeout(() => targetElem.classList.remove('copied'), 300); 
        }
    };
    
    function updateClockAndSession() {
        const now = new Date(); 
        const hours = now.getHours();
        const clockElem = document.getElementById('clock-module-new');
        const dateElem = document.getElementById('date-display-new');
        const sessionElem = document.getElementById('session-tag-new');
        if (clockElem) clockElem.innerText = now.toLocaleTimeString('id-ID');
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = String(now.getFullYear()).slice(-2);
        if (dateElem) dateElem.innerText = `${day}/${month}/${year}`;
        let session = "NY_VOL"; 
        if (hours >= 7 && hours < 14) session = "ASIA"; 
        else if (hours >= 14 && hours < 20) session = "LONDON";
        if (sessionElem) sessionElem.innerText = session;
    }
    
    function disableButtons(disabled) {
        document.querySelectorAll('.btn-tab').forEach(btn => {
            if (disabled) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });
    }
    
    async function fullReload() {
        if (isReloading) return;
        isReloading = true;
        disableButtons(true);
        document.getElementById('main-terminal')?.classList.add('syncing');
        
        stopAllIntervals();
        cleanupWebSocket();
        
        engine.sweepDetected = false; 
        engine.bosConfirmed = false; 
        engine.liquiditySide = null; 
        engine.fvgEntryActive = false;
        recentPrices = [];
        
        // Reset cooldown saat reload
        lastSignalExpiry = 0;
        lastSignalDecision = "";
        
        updateFinalDecision();
        updateWSStatus('connecting', 'LOADING');
        
        await fetchKlines();
        await fetchAdvancedMTFData();
        await fetchLatestPrice();
        
        initWebSocket();
        startPeriodicUpdates();
        startStuckChecker();
        startHeartbeat();
        startWSMonitor();
        startRestForceRefresh();
        
        // MTF background refresh setiap 60 detik
        setInterval(fetchAdvancedMTFData, 60000);
        
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
        const pairBtn = document.getElementById(`btn-${currentPair}`);
        const tfBtn = document.getElementById(`tf-${currentTF}`);
        if (pairBtn) pairBtn.classList.add('active');
        if (tfBtn) tfBtn.classList.add('active');
        
        // Langsung hilangkan efek syncing
        document.getElementById('main-terminal')?.classList.remove('syncing');
        disableButtons(false);
        isReloading = false;
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentPair === btn.dataset.pair || isReloading) return; 
            currentPair = btn.dataset.pair; 
            localStorage.setItem('lastPair', currentPair); 
            fullReload(); 
        };

    // ==================== ATR CALCULATION ====================
    let cachedATR = 0;
    let lastATRCalc = 0;
    
    function calculateATR(period = 14, data = candleData) {
        const now = Date.now();
        if (now - lastATRCalc < 5000 && cachedATR > 0) return cachedATR;
        
        if (!data.length || data.length < period + 1) return 0;
        let tr = [];
        for (let i = 1; i < data.length; i++) {
            const high = data[i].h;
            const low = data[i].l;
            const prevClose = data[i-1].c;
            const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
            tr.push(trueRange);
        }
        cachedATR = tr.slice(-period).reduce((a, b) => a + b, 0) / period;
        lastATRCalc = now;
        return cachedATR;
    }
    
    // ==================== EMA CALCULATION ====================
    function calculateEMA(data, period) {
        if (!data.length || data.length < period) return 0;
        const multiplier = 2 / (period + 1);
        let ema = data[0].c;
        for (let i = 1; i < data.length; i++) {
            ema = (data[i].c - ema) * multiplier + ema;
        }
        return ema;
    }
    
    // ==================== MACD CALCULATION ====================
    function calculateMACD(data) {
        if (!data.length || data.length < 26) return 0;
        
        const ema12 = calculateEMA(data, 12);
        const ema26 = calculateEMA(data, 26);
        const macdLine = ema12 - ema26;
        
        let macdValues = [];
        for (let i = 25; i < data.length; i++) {
            const slice = data.slice(0, i + 1);
            const e12 = calculateEMA(slice, 12);
            const e26 = calculateEMA(slice, 26);
            macdValues.push(e12 - e26);
        }
        
        if (macdValues.length < 9) return macdLine;
        
        let signalLine = 0;
        const signalMultiplier = 2 / (9 + 1);
        signalLine = macdValues[0];
        for (let i = 1; i < macdValues.length; i++) {
            signalLine = (macdValues[i] - signalLine) * signalMultiplier + signalLine;
        }
        
        return macdLine - signalLine;
    }

    // ==================== FVG MITIGATION ====================
    function detectCandleImbalance(data) {
        if (!data.length || data.length < 3) return null;
        const lastThree = data.slice(-3);
        
        for (let i = 0; i < lastThree.length - 1; i++) {
            const curr = lastThree[i];
            const next = lastThree[i + 1];
            const gapUp = next.l > curr.h;
            const gapDown = next.h < curr.l;
            
            if (gapUp) return { type: "BULLISH", price: curr.h };
            if (gapDown) return { type: "BEARISH", price: curr.l };
        }
        return null;
    }
    
    function getFVGMitigationDepthAdvanced(swingHigh, swingLow, currentPrice, candleData) {
        const imbalance = detectCandleImbalance(candleData);
        if (!imbalance) {
            const range = swingHigh - swingLow;
            if (range <= 0) return 50;
            const depth = ((currentPrice - swingLow) / range) * 100;
            return Math.min(100, Math.max(0, depth));
        }
        
        const distanceToImbalance = Math.abs(currentPrice - imbalance.price);
        const maxDistance = (swingHigh - swingLow) * 0.15;
        const mitigation = Math.min(100, Math.max(0, (1 - distanceToImbalance / maxDistance) * 100));
        
        return imbalance.type === "BULLISH" ? mitigation : 100 - mitigation;
    }

    function detectFractalSwingPoints(data, lookback = 5) {
        if (!data || data.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        let swingHigh = 0;
        let swingLow = Infinity;
        
        for (let i = lookback; i < data.length - lookback; i++) {
            const currentHigh = data[i].h;
            const currentLow = data[i].l;
            
            let isSwingHigh = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].h >= currentHigh) {
                    isSwingHigh = false;
                    break;
                }
            }
            
            let isSwingLow = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].l <= currentLow) {
                    isSwingLow = false;
                    break;
                }
            }
            
            if (isSwingHigh && currentHigh > swingHigh) swingHigh = currentHigh;
            if (isSwingLow && currentLow < swingLow) swingLow = currentLow;
        }
        
        if (swingHigh === 0) swingHigh = Math.max(...data.map(c => c.h));
        if (swingLow === Infinity) swingLow = Math.min(...data.map(c => c.l));
        
        return { swingHigh, swingLow };
    }
    
    function detectSwingPointsWithMinRange(data, lookback = 5) {
        let fractalPoints = detectFractalSwingPoints(data, lookback);
        let swingHigh = fractalPoints.swingHigh;
        let swingLow = fractalPoints.swingLow;
        
        let minRange;
        if (currentPair === "XAUUSDT") {
            switch(currentTF) {
                case "5m": minRange = 2.5; break;
                case "15m": minRange = 5.0; break;
                case "1h": minRange = 8.0; break;
                default: minRange = 5.0;
            }
        } else {
            switch(currentTF) {
                case "5m": minRange = 250; break;
                case "15m": minRange = 500; break;
                case "1h": minRange = 800; break;
                default: minRange = 500;
            }
        }
        
        let range = swingHigh - swingLow;
        
        if (range < minRange && data.length > lookback * 4) {
            const extendedLookback = Math.min(lookback * 2, 10);
            const extendedSlice = data.slice(-Math.min(data.length, Math.floor(data.length * 1.5)));
            const extendedPoints = detectFractalSwingPoints(extendedSlice, extendedLookback);
            
            const extendedRange = extendedPoints.swingHigh - extendedPoints.swingLow;
            if (extendedRange > range && extendedRange >= minRange) {
                swingHigh = extendedPoints.swingHigh;
                swingLow = extendedPoints.swingLow;
            }
        }
        
        return { swingHigh, swingLow, range: swingHigh - swingLow };
    }

    function calculateADXWithTick(currentPrice) {

        if (!candleData.length || candleData.length < 28) return 25;

                const prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                tr.push(trueRange);
                
                const upMove = high - prevHigh;
                const downMove = prevLow - low;
                
                if (upMove > downMove && upMove > 0) {
                    plusDM.push(upMove);
                    minusDM.push(0);
                } else if (downMove > upMove && downMove > 0) {
                    plusDM.push(0);
                    minusDM.push(downMove);
                } else {
                    plusDM.push(0);
                    minusDM.push(0);
                }
            }
            
            const lastCandle = data[data.length - 1];
            const currentHigh = Math.max(lastCandle.h, currentPrice);
            const currentLow = Math.min(lastCandle.l, currentPrice);
            const prevClose = lastCandle.c;
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            
            const tickUpMove = currentHigh - lastCandle.h;
            const tickDownMove = lastCandle.l - currentLow;
            if (tickUpMove > tickDownMove && tickUpMove > 0) {
                plusDM.push(tickUpMove);
                minusDM.push(0);
            } else if (tickDownMove > tickUpMove && tickDownMove > 0) {
                plusDM.push(0);
                minusDM.push(tickDownMove);
            } else {
                plusDM.push(0);
                minusDM.push(0);
            }
            
            if (tr.length < period) return 25;
            
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            
            smoothedTR /= period;
            smoothedPlusDM /= period;
            smoothedMinusDM /= period;
            
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            
            updateDIValues(plusDI, minusDI);
            
            cachedADX = Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
            lastADXCalc = now;
            return cachedADX;
        } catch (error) { console.error("ADX Error:", error); return 25; }
    }
    
    function computeRSI(currentPrice) {
        if (!candleData.length || candleData.length < 20) return 50;
        
        const period = 14;
        let closes = candleData.map(c => c.c);
        
        if (closes.length > 0 && currentPrice !== closes[closes.length - 1]) {
            closes.push(currentPrice);
        }
        
        if (closes.length < period + 1) return 50;
        
        let gains = [], losses = [];
        
        for (let i = 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff >= 0) {
                gains.push(diff);
                losses.push(0);
            } else {
                gains.push(0);
                losses.push(Math.abs(diff));
            }
        }
        
        let avgGain = 0, avgLoss = 0;
        
        for (let i = 0; i < period; i++) {
            avgGain += gains[i];
            avgLoss += losses[i];
        }
        
        avgGain /= period;
        avgLoss /= period;
        
        for (let i = period; i < gains.length; i++) {
            avgGain = ((avgGain * (period - 1)) + gains[i]) / period;
            avgLoss = ((avgLoss * (period - 1)) + losses[i]) / period;
        }
        
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return Math.min(100, Math.max(0, 100 - (100 / (1 + rs))));
    }
    
    function calculateEMA34() {
        if (!candleData.length || candleData.length < 34) return null;
        const period = 34;
        const multiplier = 2 / (period + 1);
        let ema = candleData[0].c;
        for (let i = 1; i < candleData.length; i++) {
            ema = (candleData[i].c - ema) * multiplier + ema;
        }
        return ema;
    }
    
    function detectLiquiditySweep(price) {
        if (!engine.swingHigh || !engine.swingLow) return false;
        const buffer = getSweepBuffer();
        const cooldown = getSweepCooldown();
        const now = Date.now();
        
        if (price > engine.swingHigh + buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "SELL"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        } else if (price < engine.swingLow - buffer && !engine.sweepDetected && now - engine.lastSweepTime > cooldown) {
            engine.sweepDetected = true; engine.liquiditySide = "BUY"; engine.lastSweepTime = now;
            engine.bosConfirmed = false; engine.fvgEntryActive = false;
            return true;
        }
        return false;
    }
    
    function confirmBOS(currentPrice) {
        if (!engine.sweepDetected || engine.bosConfirmed) return false;
        const now = Date.now();
        if (engine.liquiditySide === "BUY" && currentPrice > engine.swingHigh) {
            engine.bosConfirmed = true; engine.bias = "BULLISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;
            highlightFVGEntry();
            return true;
        } else if (engine.liquiditySide === "SELL" && currentPrice < engine.swingLow) {
            engine.bosConfirmed = true; engine.bias = "BEARISH_BOS"; engine.lastBosTime = now;
            engine.fvgEntryActive = true;
            highlightFVGEntry();
            return true;
        }
        return false;
    }

    function updateFinalDecision() {
        const decisionElem = document.getElementById('decision-status');
        if (!decisionElem) return;
        
        const currentPrice = lastPrice;
        const now = Date.now();
        
        // CEK APAKAH MASIH DALAM MASA COOLDOWN SINYAL TERAKHIR
        const isInCooldown = now < lastSignalExpiry;
        
        // JIKA MASIH COOLDOWN, TAMPILKAN SINYAL TERAKHIR
        if (isInCooldown && lastSignalDecision) {
            const remainingSeconds = Math.ceil((lastSignalExpiry - now) / 1000);
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            
            if (remainingSeconds > 60) {
                decisionElem.innerHTML = `${lastSignalDecision} ⏱️ ${minutes}m`;
            } else {
                decisionElem.innerHTML = `${lastSignalDecision} ⏱️ ${seconds}s`;
            }
            decisionElem.style.color = "var(--accent)";
            decisionElem.style.background = "rgba(0, 255, 170, 0.2)";
            return;
        }
        
        // ==================== NORMAL ANALYSIS ====================
        
        const isBullishBias = engine.bias === "BULLISH" || engine.bias === "BULLISH_BOS";
        const isBearishBias = engine.bias === "BEARISH" || engine.bias === "BEARISH_BOS";
        const isTrendStrong = engine.adx > 20;
        const isRanging = engine.adx < 15;
        
        const entryZoneLow = Math.min(engine.f618, engine.deep);
        const entryZoneHigh = Math.max(engine.f618, engine.deep);
        const isPriceInZone = currentPrice >= entryZoneLow && currentPrice <= entryZoneHigh;
        
        const isSweepActive = engine.sweepDetected && !engine.bosConfirmed;
        const isBOSConfirmed = engine.bosConfirmed && engine.fvgEntryActive;
        
        const fvgDepth = getFVGMitigationDepthAdvanced(engine.swingHigh, engine.swingLow, currentPrice, candleData);
        const isFVGReadyBool = isFVGReady(fvgDepth, isBullishBias || isBOSConfirmed, candleData);
        
        // Menggunakan MTF Analysis yang lebih akurat
        const m5Bullish = mtfAnalysisCache.m5.bias === "BULLISH";
        const m15Bullish = mtfAnalysisCache.m15.bias === "BULLISH";
        const h1Bullish = mtfAnalysisCache.h1.bias === "BULLISH";
        const m5Bearish = mtfAnalysisCache.m5.bias === "BEARISH";
        const m15Bearish = mtfAnalysisCache.m15.bias === "BEARISH";
        const h1Bearish = mtfAnalysisCache.h1.bias === "BEARISH";
        
        const bullishCount = (m5Bullish ? 1 : 0) + (m15Bullish ? 1 : 0) + (h1Bullish ? 1 : 0);
        const bearishCount = (m5Bearish ? 1 : 0) + (m15Bearish ? 1 : 0) + (h1Bearish ? 1 : 0);
        
        const isMTFBullish = bullishCount >= 2;
        const isMTFBearish = bearishCount >= 2;
        
        const isAboveEMA = currentPrice > engine.ema34;
        const isBelowEMA = currentPrice < engine.ema34;
        
        const priceChange = Math.abs(currentPrice - (lastDecisionPrice || currentPrice));
        const hasSignificantMove = currentPair === "XAUUSDT" ? priceChange > 0.3 : priceChange > 30;
        lastDecisionPrice = currentPrice;
        
        let decision = "";
        let decisionColor = "";
        let decisionBg = "";
        let shouldAnimate = false;
        let isSignalAllowed = false;
        
        // PRIORITAS 1: STRONG BUY (Sweep/BOS)
        if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && (isBullishBias && (isBOSConfirmed || isSweepActive)) && lastArrowDirection === "up") {
            isSignalAllowed = true;
            decision = "✅ BUY NOW! 🔥";
            decisionColor = "var(--accent)";
            decisionBg = "rgba(0, 255, 170, 0.25)";
            shouldAnimate = true;
        }
        // PRIORITAS 2: STRONG SELL (Sweep/BOS)
        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && (isBearishBias && (isBOSConfirmed || isSweepActive)) && lastArrowDirection === "down") {
            isSignalAllowed = true;
            decision = "🔻 SELL NOW! 🔥";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.25)";
            shouldAnimate = true;
        }
        // PRIORITAS 3: MTF CONFLUENCE (AKURAT)
        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isMTFBullish && !isBearishBias) {
            isSignalAllowed = true;
            decision = "✅ BUY NOW! 🔥 (MTF)";
            decisionColor = "var(--accent)";
            decisionBg = "rgba(0, 255, 170, 0.2)";
            shouldAnimate = true;
        }
        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isMTFBearish && !isBullishBias) {
            isSignalAllowed = true;
            decision = "🔻 SELL NOW! 🔥 (MTF)";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.2)";
            shouldAnimate = true;
        }
        // PRIORITAS 4: EMA34
        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isAboveEMA && !isBearishBias) {
            isSignalAllowed = true;
            decision = "✅ BUY NOW! 🔥 (EMA)";
            decisionColor = "var(--accent)";
            decisionBg = "rgba(0, 255, 170, 0.2)";
            shouldAnimate = true;
        }
        else if ((isTrendStrong || hasSignificantMove) && !isRanging && isPriceInZone && isBelowEMA && !isBullishBias) {
            isSignalAllowed = true;
            decision = "🔻 SELL NOW! 🔥 (EMA)";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.2)";
            shouldAnimate = true;
        }
        // KONDISI LAIN
        else if (isSweepActive && !isBOSConfirmed) {
            decision = "⏳ WAITING BOS...";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.1)";
        }
        else if (isBOSConfirmed && !isPriceInZone) {
            decision = "⏳ WAITING ENTRY ZONE...";
            decisionColor = "var(--gold)";
            decisionBg = "rgba(255, 204, 0, 0.1)";
        }
        else if (isRanging && !hasSignificantMove) {
            decision = "⏳ WAIT (LOW VOLATILITY)";
            decisionColor = "var(--silver-dark)";
            decisionBg = "rgba(170, 170, 170, 0.1)";
        }
        else if (isPriceInZone && (isTrendStrong || hasSignificantMove) && !isSweepActive && !isBOSConfirmed) {
            decision = "⏳ WAITING SWEEP...";
            decisionColor = "var(--orange)";
            decisionBg = "rgba(255, 136, 77, 0.1)";
        }
        else {
            decision = "⏸ NO SETUP";
            decisionColor = "var(--silver-dark)";
            decisionBg = "rgba(170, 170, 170, 0.05)";
        }
        
        // FVG VALIDATION
        if (isSignalAllowed) {
            if (!isFVGReadyBool) {
                const fvgNeeded = 30;
                const currentFVG = (decision.includes("BUY") || isBullishBias) ? fvgDepth : (100 - fvgDepth);
                decision = `⏳ FVG: ${Math.round(currentFVG)}%/${fvgNeeded}%`;
                decisionColor = "var(--orange)";
                decisionBg = "rgba(255, 136, 77, 0.15)";
                isSignalAllowed = false;
                shouldAnimate = false;
            }
        }
        
        // JIKA SINYAL VALID, AKTIFKAN COOLDOWN
        if (isSignalAllowed) {
            lastSignalExpiry = now + (THROTTLE_MINUTES * 60 * 1000);
            lastSignalDecision = decision;
            lastSignalTime = now;
            
            decisionElem.innerHTML = decision;
            decisionElem.style.color = decisionColor;
            decisionElem.style.background = decisionBg;
            
            if (shouldAnimate) {
                decisionElem.classList.add('decision-animate');
                setTimeout(() => {
                    if (decisionElem) decisionElem.classList.remove('decision-animate');
                }, 600);
            }
            
            updateThrottle(currentPair, currentTF);
            lastDecision = decision;
            return;
        }
        
        // TAMPILKAN DECISION NON-SINYAL
        if (lastDecision !== decision) {
            shouldAnimate = true;
            lastDecision = decision;
        }
        
        decisionElem.innerHTML = decision;
        decisionElem.style.color = decisionColor;
        decisionElem.style.background = decisionBg;
        
        if (shouldAnimate) {
            decisionElem.classList.add('decision-animate');
            setTimeout(() => {
                if (decisionElem) decisionElem.classList.remove('decision-animate');
            }, 600);
        }
    }

    function calculateSMCLevels() {
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = getLookback();
        const fractalLookback = getFractalLookback();
        
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const swingPoints = detectSwingPointsWithMinRange(slice, fractalLookback);
        
        let swingHigh = swingPoints.swingHigh;
        let swingLow = swingPoints.swingLow;
        
        const lastCandle = candleData[candleData.length - 1];
        const currentPrice = lastPrice > 0 ? lastPrice : lastCandle.c;
        const range = swingHigh - swingLow;
        
        if (range <= 0) return;
        
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        resetSweepIfStructureChanged();
        
        if (!engine.bosConfirmed) { 
            engine.bias = currentPrice > (swingHigh + swingLow) / 2 ? "BULLISH" : "BEARISH"; 
        }
        
        const isBullish = engine.bosConfirmed ? engine.bias === "BULLISH_BOS" : engine.bias === "BULLISH";
        
        if (isBullish) {
            engine.f618 = swingLow + (range * 0.618);
            engine.deep = swingLow + (range * 0.79);
            engine.tp = swingHigh + (range * 0.23);
        } else {
            engine.f618 = swingHigh - (range * 0.618);
            engine.deep = swingHigh - (range * 0.79);
            engine.tp = swingLow - (range * 0.23);
        }
        
        updateSwingUI(); 
        updateFinalDecision();
    }

        cleanupWebSocket();
        updateWSStatus('connecting', 'CONNECTING');
        
        const wsUrl = `wss://fstream.binance.com/ws/${currentPair.toLowerCase()}@aggTrade`;
        wsConnection = new WebSocket(wsUrl);

            updateWSStatus('live', 'LIVE');
        };

            try {
                const msg = JSON.parse(event.data);
                if (msg.p && !isReloading) {
                    const tradePrice = parseFloat(msg.p);
                    lastWSMessageTime = Date.now();
                    calculateSMCLevels(); 
                    detectLiquiditySweep(tradePrice); 
                    confirmBOS(tradePrice); 
                    updateUI(tradePrice);
                }

            if (!isManualDisconnect && !isReloading) {
                updateWSStatus('reconnect', 'RECONNECT');
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    if (!isReloading && !isManualDisconnect) {
                        reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
                        initWebSocket();
                    }
                }, reconnectDelay);
            }
        };
        
        wsConnection.onerror = (error) => {
            console.warn(`WebSocket error: ${currentPair}`, error);
            if (!isManualDisconnect && !isReloading) updateWSStatus('reconnect', 'ERROR');
        };
    }

        stuckCheckInterval = setInterval(() => { 
            if (wsConnection && wsConnection.readyState !== WebSocket.OPEN && !isReloading && !isManualDisconnect) {
                updateWSStatus('reconnect', 'RECONNECT');
            }
        }, 5000); 
    }
    
    window.smartCopy = function(id) {
        let textToCopy = "";
        if (id === 'mtf-paragraph') { 
            const mtfElem = document.getElementById('mtf-paragraph-text'); 
            if (mtfElem) textToCopy = mtfElem.innerText; 
        }
        else if (id === 'entry-zone') {
            const r618 = document.getElementById('r618');
            const r79 = document.getElementById('r79');
            if (r618 && r79) textToCopy = `Entry 0.618: ${r618.innerText} | Entry 0.79: ${r79.innerText}`;
        }
        else if (id === 'swing-high-value') {
            const swingHighVal = document.getElementById('swing-high-value');
            if (swingHighVal) textToCopy = swingHighVal.innerText;
        }
        else if (id === 'swing-low-value') {
            const swingLowVal = document.getElementById('swing-low-value');
            if (swingLowVal) textToCopy = swingLowVal.innerText;
        }
        else if (id === 'rTP') {
            const tpVal = document.getElementById('rTP');
            if (tpVal) textToCopy = tpVal.innerText;
        }
        else if (id === 'live-price') {
            const priceElem = document.getElementById('live-price');
            if (priceElem) textToCopy = priceElem.innerText;
        }
        else { 
            const el = document.getElementById(id); 
            if (el) textToCopy = el.innerText; 
        }
        if (!textToCopy) return;
        navigator.clipboard.writeText(textToCopy);
        const targetElem = document.getElementById(id);
        if (targetElem) { 
            targetElem.classList.add('copied'); 
            setTimeout(() => targetElem.classList.remove('copied'), 300); 
        }
    };
    
    function updateClockAndSession() {
        const now = new Date(); 
        const hours = now.getHours();
        const clockElem = document.getElementById('clock-module-new');
        const dateElem = document.getElementById('date-display-new');
        const sessionElem = document.getElementById('session-tag-new');
        if (clockElem) clockElem.innerText = now.toLocaleTimeString('id-ID');
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = String(now.getFullYear()).slice(-2);
        if (dateElem) dateElem.innerText = `${day}/${month}/${year}`;
        let session = "NY_VOL"; 
        if (hours >= 7 && hours < 14) session = "ASIA"; 
        else if (hours >= 14 && hours < 20) session = "LONDON";
        if (sessionElem) sessionElem.innerText = session;
    }
    
    function disableButtons(disabled) {
        document.querySelectorAll('.btn-tab').forEach(btn => {
            if (disabled) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });
    }
    
    async function fullReload() {
        if (isReloading) return;
        isReloading = true;
        disableButtons(true);
        document.getElementById('main-terminal')?.classList.add('syncing');
        
        stopAllIntervals();
        cleanupWebSocket();
        
        engine.sweepDetected = false; 
        engine.bosConfirmed = false; 
        engine.liquiditySide = null; 
        engine.fvgEntryActive = false;
        recentPrices = [];
        
        // Reset cooldown saat reload
        lastSignalExpiry = 0;
        lastSignalDecision = "";
        
        updateFinalDecision();
        updateWSStatus('connecting', 'LOADING');
        
        await fetchKlines();
        await fetchAdvancedMTFData();
        await fetchLatestPrice();
        
        initWebSocket();
        startPeriodicUpdates();
        startStuckChecker();
        startHeartbeat();
        startWSMonitor();
        startRestForceRefresh();
        
        // MTF background refresh setiap 60 detik
        setInterval(fetchAdvancedMTFData, 60000);
        
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
        const pairBtn = document.getElementById(`btn-${currentPair}`);
        const tfBtn = document.getElementById(`tf-${currentTF}`);
        if (pairBtn) pairBtn.classList.add('active');
        if (tfBtn) tfBtn.classList.add('active');
        
        // Langsung hilangkan efek syncing
        document.getElementById('main-terminal')?.classList.remove('syncing');
        disableButtons(false);
        isReloading = false;
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentPair === btn.dataset.pair || isReloading) return; 
            currentPair = btn.dataset.pair; 
            localStorage.setItem('lastPair', currentPair); 
            fullReload(); 
        }; 
    });
    
    document.querySelectorAll('[data-tf]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentTF === btn.dataset.tf || isReloading) return; 
            currentTF = btn.dataset.tf; 
            localStorage.setItem('lastTF', currentTF); 
            fullReload(); 
        }; 
    });
    
    setInterval(updateClockAndSession, 1000);
    fullReload();
</script>
</body>
</html>
