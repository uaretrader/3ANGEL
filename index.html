<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMC APEX v17.1.0 | URTRADER TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg: #010101; --accent: #00ffaa; --gold: #ffcc00; --danger: #ff4757; --blue: #00d4ff; 
            --purple: #aa66ff; --orange: #ff884d; --border: rgba(0, 255, 170, 0.2); 
            --silver-bright: #e0e0e0; --silver-medium: #c0c0c0; --silver-dark: #a9a9a9; 
            --gold-dim: rgba(255, 204, 0, 0.12); --card-bg: #050505;
            --highlight-bull: #00cc88; --highlight-bear: #ff8866; --highlight-neutral: #aaaaaa;
            --dxy-up: #ff8866; --dxy-down: #00cc88;
        }
        
        body { 
            font-family: 'Space Grotesk', sans-serif; background: #000; color: var(--silver-bright); 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
            position: fixed; top: 0; left: 0; 
        }
        
        .app-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        .terminal-container { width: 100%; background: var(--bg); position: relative; z-index: 10; flex-shrink: 0; }
        
        .header { padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; flex-wrap: wrap; gap: 10px; }
        .brand-container { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
        .brand { font-weight: 900; font-size: 0.85rem; letter-spacing: 2px; color: var(--accent); text-align: left; }
        .meta-label-sub { font-size: 0.55rem; color: var(--silver-dark); letter-spacing: 3px; font-family: 'JetBrains Mono'; font-weight: 800; text-align: left; }
        
        #sys-status { 
            font-family: 'JetBrains Mono'; 
            font-size: 0.65rem; 
            font-weight: 800; 
            border-left: 2px solid var(--gold); 
            padding-left: 8px; 
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .ws-status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .ws-status-dot.live { 
            background: var(--accent); 
            box-shadow: 0 0 8px var(--accent);
            animation: pulseLive 1s ease infinite;
        }
        .ws-status-dot.reconnect { 
            background: var(--orange); 
            animation: pulseReconnect 0.8s ease infinite;
        }
        .ws-status-dot.offline { 
            background: var(--danger); 
            animation: none;
            box-shadow: none;
        }
        .ws-status-dot.fallback { 
            background: var(--blue); 
            animation: pulseFallback 1s ease infinite;
        }
        @keyframes pulseFallback {
            0%, 100% { opacity: 1; transform: scale(1); background: var(--blue); }
            50% { opacity: 0.6; transform: scale(0.9); background: #00aaff; }
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--accent); }
            50% { opacity: 0.6; transform: scale(0.9); box-shadow: 0 0 4px var(--accent); }
        }
        @keyframes pulseReconnect {
            0%, 100% { opacity: 1; transform: scale(1); background: var(--orange); }
            50% { opacity: 0.5; transform: scale(0.85); background: #ffaa66; }
        }
        
        .nav-section { display: flex; gap: 12px; padding: 12px 16px; justify-content: space-between; flex-wrap: wrap; background: #000; align-items: center; }
        .nav-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-tab { 
            background: transparent;
            border: none;
            color: var(--silver-dark); 
            padding: 7px 14px; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            cursor: pointer; 
            font-family: 'JetBrains Mono'; 
            transition: 0.1s; 
            letter-spacing: 0.3px;
        }
        .btn-tab.active { 
            color: var(--accent); 
            background: rgba(0, 255, 170, 0.08); 
            box-shadow: 0 0 8px rgba(0, 255, 170, 0.25);
        }
        .btn-tab.disabled { 
            opacity: 0.5; 
            cursor: wait; 
            pointer-events: none; 
        }
        .btn-tab:hover:not(.disabled) {
            color: var(--accent);
            background: rgba(0, 255, 170, 0.05);
        }
        
        .hero-display { padding: 8px 20px 20px; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; width: 100%; }
        
        .hero-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            width: 100%;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            align-items: center;
            justify-content: flex-start;
        }
        
        .adx-status {
            background: transparent;
            padding: 4px 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }
        .adx-bar-container { display: none; }
        .adx-bar { display: none; }
        .adx-value { 
            font-weight: 800; 
            min-width: 45px; 
            text-align: right;
            color: var(--silver-bright);
        }
        .adx-direction {
            font-size: 1rem;
            font-weight: 800;
            margin-left: 4px;
        }
        .adx-status.strong .adx-direction { color: var(--accent); }
        .adx-status.weak .adx-direction { color: var(--gold); }
        .adx-status.ranging .adx-direction { color: var(--silver-dark); }
        
        .ema34-status {
            background: transparent;
            padding: 4px 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }
        .ema34-status .ema34-label {
            color: var(--silver-bright);
        }
        .ema34-value { 
            font-weight: 800; 
            min-width: 70px; 
            text-align: right;
            transition: color 0.1s ease;
        }
        .ema34-status.bullish .ema34-value {
            color: var(--accent) !important;
        }
        .ema34-status.bearish .ema34-value {
            color: var(--danger) !important;
        }
        .ema34-status .ema34-value {
            color: var(--orange);
        }
        
        .dxy-status {
            background: transparent;
            padding: 4px 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 0.75rem;
            transition: all 0.1s ease;
        }
        .dxy-value {
            font-weight: 800;
            min-width: 48px;
            text-align: right;
        }
        .dxy-direction {
            font-size: 1rem;
            font-weight: 800;
            transition: all 0.1s ease;
        }
        .dxy-change {
            font-size: 0.65rem;
            opacity: 0.8;
            min-width: 45px;
        }
        .dxy-status.bullish .dxy-direction { color: var(--dxy-up); }
        .dxy-status.bearish .dxy-direction { color: var(--dxy-down); }
        .dxy-status.neutral .dxy-direction { color: var(--silver-dark); }
        .dxy-status.loading { opacity: 0.6; }
        
        .decision-panel {
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 24px;
            border: 1px solid var(--gold-dim);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            font-family: 'JetBrains Mono';
            font-weight: 800;
            font-size: 0.55rem;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            flex: 1;
            min-height: 65px;
            margin-top: 8px;
        }
        .decision-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .decision-label {
            color: var(--gold);
        }
        #decision-status {
            font-weight: 900;
            transition: all 0.2s ease;
        }
        .direction-arrow {
            font-size: 1.2rem;
            font-weight: 800;
            transition: all 0.1s ease;
            min-width: 45px;
            text-align: right;
            cursor: default;
        }
        
        .rsi-panel {
            margin-top: 16px;
            margin-bottom: 12px;
            padding: 10px 14px;
            border: 1px solid var(--gold-dim);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            text-align: left;
            width: 100%;
        }
        .rsi-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .rsi-tag {
            font-size: 0.55rem;
            font-weight: 900;
            color: var(--silver-dark);
            font-family: 'JetBrains Mono';
            letter-spacing: 1px;
        }
        #rsi-val {
            font-family: 'JetBrains Mono';
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--silver-bright);
        }
        .rsi-track {
            height: 3px;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }
        #rsi-bar {
            height: 100%;
            width: 0%;
            background: var(--silver-medium);
            transition: width 0.1s ease, background 0.1s;
        }
        
        .mtf-paragraph-card {
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 8px 12px;
            margin: 0 0 10px 0;
            border: 1px solid rgba(255, 204, 0, 0.15);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mtf-paragraph-card:hover {
            background: rgba(0,0,0,0.6);
            border-color: var(--accent);
        }
        .mtf-paragraph-text {
            font-family: 'JetBrains Mono';
            font-size: 0.65rem;
            line-height: 1.4;
            letter-spacing: 0.2px;
            color: var(--silver-bright);
        }
        .mtf-highlight {
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 8px;
            display: inline-block;
            background: rgba(0, 255, 170, 0.12);
            color: var(--accent);
        }
        .mtf-highlight-bull {
            background: rgba(0, 204, 136, 0.15);
            color: #00cc88;
        }
        .mtf-highlight-bear {
            background: rgba(255, 136, 102, 0.15);
            color: #ff8866;
        }
        .mtf-highlight-neutral {
            background: rgba(170, 170, 170, 0.15);
            color: #cccccc;
        }
        
        @media (max-width: 700px) {
            .hero-meta-row { gap: 8px; }
            .adx-status, .ema34-status, .dxy-status {
                font-size: 0.65rem;
                padding: 4px 6px;
            }
            .mtf-paragraph-text { font-size: 0.55rem; }
            .direction-arrow {
                font-size: 1.2rem;
                min-width: 35px;
            }
            .dxy-change { display: none; }
        }
        
        #live-price { font-family: 'JetBrains Mono'; font-size: 2.5rem; font-weight: 800; letter-spacing: -2px; color: #fff; line-height: 1; cursor: pointer; transition: color 0.05s linear; word-break: break-word; text-align: left; width: 100%; margin-top: 4px; }
        .price-decimal { color: var(--accent); opacity: 0.7; font-size: 2.2rem; }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            width: 100%;
            background: #0b0b0b;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .data-item {
            background: var(--bg);
            padding: 10px 4px;
            border-right: 1px solid rgba(255,255,255,0.03);
            transition: background 0.1s;
            cursor: pointer;
        }
        .data-item:last-child { border-right: none; }
        .data-label {
            font-size: 0.45rem;
            color: var(--silver-medium);
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
            font-weight: 700;
            letter-spacing: 0.8px;
        }
        .data-val {
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: #fff;
            font-weight: 800;
            line-height: 1.2;
        }
        .data-item-swing-left { text-align: left; padding-left: 14px; }
        .data-item-swing-center { text-align: center; }
        .data-item-entry-center { text-align: center; }
        .data-item-tp-right { text-align: right; padding-right: 14px; }
        
        .entry-gold { color: var(--gold) !important; text-shadow: 0 0 4px rgba(255, 204, 0, 0.5); }
        .tp-blue { color: var(--blue) !important; }
        .fvg-highlight { animation: fvgPulse 0.8s ease 2; text-shadow: 0 0 8px var(--accent); }
        @keyframes fvgPulse { 0% { text-shadow: 0 0 0 var(--accent); } 100% { text-shadow: 0 0 12px var(--accent); } }
        
        .terminal-box { padding: 0 16px 14px 16px; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid #151515; border-radius: 12px; padding: 12px; backdrop-filter: blur(2px); }
        
        .footer-info { 
            padding: 8px 0 0 0;
            background: transparent; 
            border-radius: 12px; 
            display: flex; 
            justify-content: flex-start;
            align-items: center; 
            flex-wrap: wrap; 
            gap: 10px;
            margin-top: 8px;
        }
        .session-module-new, .date-module-new, .clock-module-new {
            font-weight: 800;
            background: #080808;
            padding: 4px 12px;
            border-radius: 16px;
            letter-spacing: 1px;
            font-size: 0.55rem;
            font-family: 'JetBrains Mono';
            border: 1px solid #1f1f1f;
        }
        .session-module-new { color: var(--gold); }
        .date-module-new { color: var(--silver-bright); }
        .clock-module-new { color: #fff; background: #000; border-color: var(--accent); }
        
        .syncing { opacity: 0.8; transition: opacity 0.1s; pointer-events: none; }
        .syncing * { pointer-events: none; }
        .copied { color: #fff !important; text-shadow: 0 0 8px var(--accent); transition: 0.1s; }
        
        @keyframes decisionPulse {
            0% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0 var(--accent); }
            50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 8px var(--accent); }
            100% { transform: scale(1); opacity: 0.8; text-shadow: 0 0 0 var(--accent); }
        }
        .decision-animate {
            animation: decisionPulse 0.6s ease-in-out !important;
        }
        
        @keyframes arrowPulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); text-shadow: 0 0 6px currentColor; }
            100% { opacity: 0.7; transform: scale(1); }
        }
        .arrow-pulse {
            animation: arrowPulse 0.2s ease !important;
        }
        
        @keyframes signalPulse {
            0% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.01); background: rgba(0, 255, 170, 0.15); }
            100% { opacity: 0.9; transform: scale(1); }
        }
        .signal-active {
            animation: signalPulse 1s ease-in-out infinite;
        }
        
        @media (max-width: 480px) {
            .data-item-swing-left { padding-left: 10px; }
            .data-item-tp-right { padding-right: 10px; }
            .hero-display { padding: 8px 12px 20px 12px; }
            .header { padding: 12px 12px; }
            .nav-section { padding: 12px 12px; }
            .decision-panel { padding: 6px 12px; gap: 10px; min-height: 55px; }
            .direction-arrow { font-size: 1.1rem; min-width: 30px; }
            #live-price { font-size: 2rem; }
            .price-decimal { font-size: 1.8rem; }
            .adx-status, .ema34-status, .dxy-status { font-size: 0.55rem; }
            .ema34-value { min-width: 55px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <div class="terminal-container" id="main-terminal">
        <header class="header">
            <div class="brand-container">
                <div class="brand">SMC_APEX v17.1.0</div>
                <div class="meta-label-sub">URTRADER TERMINAL | E-FIVE</div>
            </div>
            <div id="sys-status">
                <span class="ws-status-dot" id="ws-status-dot"></span>
                <span id="ws-status-text">INITIALIZING</span>
            </div>
        </header>

        <nav class="nav-section">
            <div class="nav-group">
                <button class="btn-tab" data-pair="XAUUSDT" id="btn-XAUUSDT">XAUUSD</button>
                <button class="btn-tab" data-pair="BTCUSDT" id="btn-BTCUSDT">BTCUSD</button>
            </div>
            <div class="nav-group">
                <button class="btn-tab" data-tf="5m" id="tf-5m">M5</button>
                <button class="btn-tab" data-tf="15m" id="tf-15m">M15</button>
                <button class="btn-tab" data-tf="1h" id="tf-1h">H1</button>
            </div>
        </nav>

        <main class="hero-display">
            <div class="hero-meta-row">
                <div class="adx-status ranging" id="adx-status">
                    <span>ADX</span>
                    <span class="adx-value" id="adx-value">--</span>
                    <span id="adx-direction" class="adx-direction">⬌</span>
                </div>
                
                <div class="ema34-status" id="ema34-status">
                    <span class="ema34-label">📊 EMA</span>
                    <span class="ema34-value" id="ema34-value">--</span>
                </div>
                
                <div class="dxy-status neutral" id="dxy-status">
                    <span>💵</span>
                    <span class="dxy-value" id="dxy-value">--</span>
                    <span id="dxy-direction" class="dxy-direction">⬌</span>
                    <span class="dxy-change" id="dxy-change">--</span>
                </div>
            </div>
            
            <div class="decision-panel">
                <div class="decision-text">
                    <span class="decision-label">🎯 DECISION:</span>
                    <span id="decision-status">🔍 ANALYZING...</span>
                </div>
                <div id="direction-arrow" class="direction-arrow">⬌</div>
            </div>
            
            <div id="live-price" onclick="smartCopy('live-price')">0.00</div>
            
            <div class="rsi-panel">
                <div class="rsi-meta">
                    <div class="rsi-tag">RSI (14)</div>
                    <div id="rsi-val">---</div>
                </div>
                <div class="rsi-track"><div id="rsi-bar"></div></div>
            </div>
        </main>

        <section class="data-grid">
            <div class="data-item data-item-swing-left" onclick="smartCopy('swing-high-value')">
                <span class="data-label" style="color:var(--accent)">📈 SWING H</span>
                <div class="data-val" id="swing-high-value">--</div>
            </div>
            <div class="data-item data-item-swing-center" onclick="smartCopy('swing-low-value')">
                <span class="data-label" style="color:var(--accent)">📉 SWING L</span>
                <div class="data-val" id="swing-low-value">--</div>
            </div>
            <div class="data-item data-item-entry-center" onclick="smartCopy('entry-zone')">
                <span class="data-label" style="color:var(--accent)">ZONA ENTRY</span>
                <div class="data-val" id="entry-zone">
                    <span id="r618" class="entry-gold">0.00</span><br>
                    <span id="r79" class="entry-gold">0.00</span>
                </div>
            </div>
            <div class="data-item data-item-tp-right" onclick="smartCopy('rTP')">
                <span class="data-label" style="color:var(--blue)">TP (21%)</span>
                <div class="data-val tp-blue" id="rTP">0.00</div>
            </div>
        </section>

        <section class="terminal-box">
            <div class="card">
                <div class="mtf-paragraph-card" id="mtf-paragraph" onclick="smartCopy('mtf-paragraph')">
                    <div class="mtf-paragraph-text" id="mtf-paragraph-text">
                        📊 MULTI-TIMEFRAME: 
                    </div>
                </div>
                
                <div class="footer-info" id="footer-info-module">
                    <div class="session-module-new" id="session-module-new"><span id="session-tag-new">ASIA</span></div>
                    <div class="date-module-new" id="date-display-new">--/--/--</div>
                    <div class="clock-module-new" id="clock-module-new">00:00:00</div>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    // ==================== KONFIGURASI & STATE ====================
    let currentPair = localStorage.getItem('lastPair') || "XAUUSDT";
    let currentTF = localStorage.getItem('lastTF') || "15m";
    let wsConnection = null;
    let lastPrice = 0;
    let candleData = [];
    let isReloading = false;
    let reconnectTimer = null;
    let periodicInterval = null;
    let stuckCheckInterval = null;
    let heartbeatInterval = null;
    let restFallbackInterval = null;
    let isManualDisconnect = false;
    let reconnectDelay = 1000;
    let lastStructureUpdateTime = 0;
    let lastDecision = "";
    let lastArrowDirection = "neutral";
    let lastUIElementsUpdate = 0;
    let recentPrices = [];
    let lastDecisionPrice = 0;
    let lastWSMessageTime = Date.now();
    let isUsingFallback = false;
    const UI_UPDATE_INTERVAL = 100;
    const THROTTLE_MINUTES = 2;
    
    // ==================== DXY TRACKER ====================
    let dxyPrice = 104.50;
    let dxyPrevPrice = 104.50;
    let dxyChange = 0;
    let dxyDirection = "neutral";
    let dxyLastFetch = 0;
    
    function updateDXYFromPrice(price) {
        if (currentPair === "XAUUSDT" && price > 0) {
            const xauBaseline = 4500;
            const xauDeviation = ((price - xauBaseline) / xauBaseline) * 100;
            const estimatedDXY = 104.5 - (xauDeviation * 0.3);
            
            dxyPrevPrice = dxyPrice;
            dxyPrice = Math.max(100, Math.min(110, estimatedDXY));
            
            if (dxyPrevPrice > 0) {
                dxyChange = ((dxyPrice - dxyPrevPrice) / dxyPrevPrice) * 100;
            } else {
                dxyChange = 0;
            }
            
            if (dxyChange > 0.03) dxyDirection = "up";
            else if (dxyChange < -0.03) dxyDirection = "down";
            else dxyDirection = "neutral";
            
            updateDXYDisplay();
        } else if (currentPair === "BTCUSDT" && price > 0) {
            const btcBaseline = 67000;
            const btcDeviation = ((price - btcBaseline) / btcBaseline) * 100;
            const estimatedDXY = 104.5 - (btcDeviation * 0.15);
            
            dxyPrevPrice = dxyPrice;
            dxyPrice = Math.max(100, Math.min(110, estimatedDXY));
            
            if (dxyPrevPrice > 0) {

    function calculateATR(period = 14, data = candleData) {
        const now = Date.now();
        if (now - lastATRCalc < 5000 && cachedATR > 0) return cachedATR;
        
        if (!data.length || data.length < period + 1) return 0;
        let tr = [];
        for (let i = 1; i < data.length; i++) {
            const high = data[i].h;
            const low = data[i].l;
            const prevClose = data[i-1].c;
            const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
            tr.push(trueRange);
        }
        cachedATR = tr.slice(-period).reduce((a, b) => a + b, 0) / period;
        lastATRCalc = now;
        return cachedATR;
    }

    function detectFractalSwingPoints(data, lookback = 5) {
        if (!data || data.length < lookback * 2 + 1) return { swingHigh: 0, swingLow: Infinity };
        
        let swingHigh = 0;
        let swingLow = Infinity;
        
        for (let i = lookback; i < data.length - lookback; i++) {
            const currentHigh = data[i].h;
            const currentLow = data[i].l;
            
            let isSwingHigh = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].h >= currentHigh) {
                    isSwingHigh = false;
                    break;
                }
            }
            
            let isSwingLow = true;
            for (let j = i - lookback; j <= i + lookback; j++) {
                if (j !== i && data[j].l <= currentLow) {
                    isSwingLow = false;
                    break;
                }
            }
            
            if (isSwingHigh && currentHigh > swingHigh) swingHigh = currentHigh;
            if (isSwingLow && currentLow < swingLow) swingLow = currentLow;
        }
        
        if (swingHigh === 0) swingHigh = Math.max(...data.map(c => c.h));
        if (swingLow === Infinity) swingLow = Math.min(...data.map(c => c.l));
        
        return { swingHigh, swingLow };
    }
    
    function detectSwingPointsWithMinRange(data, lookback = 5) {
        let fractalPoints = detectFractalSwingPoints(data, lookback);
        let swingHigh = fractalPoints.swingHigh;
        let swingLow = fractalPoints.swingLow;
        
        let minRange;
        if (currentPair === "XAUUSDT") {
            switch(currentTF) {
                case "5m": minRange = 2.5; break;
                case "15m": minRange = 5.0; break;
                case "1h": minRange = 8.0; break;
                default: minRange = 5.0;
            }
        } else {
            switch(currentTF) {
                case "5m": minRange = 250; break;
                case "15m": minRange = 500; break;
                case "1h": minRange = 800; break;
                default: minRange = 500;
            }
        }
        
        let range = swingHigh - swingLow;
        
        if (range < minRange && data.length > lookback * 4) {
            const extendedLookback = Math.min(lookback * 2, 10);
            const extendedSlice = data.slice(-Math.min(data.length, Math.floor(data.length * 1.5)));
            const extendedPoints = detectFractalSwingPoints(extendedSlice, extendedLookback);
            
            const extendedRange = extendedPoints.swingHigh - extendedPoints.swingLow;
            if (extendedRange > range && extendedRange >= minRange) {
                swingHigh = extendedPoints.swingHigh;
                swingLow = extendedPoints.swingLow;
            }
        }
        
        return { swingHigh, swingLow, range: swingHigh - swingLow };
    }
    
    let cachedADX = 25;
    let lastADXCalc = 0;
    
    function calculateADXWithTick(currentPrice) {
        const now = Date.now();
        if (now - lastADXCalc < 2000) return cachedADX;
        
        if (!candleData.length || candleData.length < 28) return 25;
        try {
            const period = 14;
            const data = [...candleData];
            if (data.length < period + 1) return 25;
            
            let tr = [], plusDM = [], minusDM = [];
            
            for (let i = 1; i < data.length; i++) {
                const high = data[i].h, low = data[i].l;
                const prevHigh = data[i-1].h, prevLow = data[i-1].l, prevClose = data[i-1].c;
                const trueRange = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                tr.push(trueRange);
                
                const upMove = high - prevHigh;
                const downMove = prevLow - low;
                
                if (upMove > downMove && upMove > 0) {
                    plusDM.push(upMove);
                    minusDM.push(0);
                } else if (downMove > upMove && downMove > 0) {
                    plusDM.push(0);
                    minusDM.push(downMove);
                } else {
                    plusDM.push(0);
                    minusDM.push(0);
                }
            }
            
            const lastCandle = data[data.length - 1];
            const currentHigh = Math.max(lastCandle.h, currentPrice);
            const currentLow = Math.min(lastCandle.l, currentPrice);
            const prevClose = lastCandle.c;
            const tickTR = Math.max(currentHigh - currentLow, Math.abs(currentHigh - prevClose), Math.abs(currentLow - prevClose));
            tr.push(tickTR);
            
            const tickUpMove = currentHigh - lastCandle.h;
            const tickDownMove = lastCandle.l - currentLow;
            if (tickUpMove > tickDownMove && tickUpMove > 0) {
                plusDM.push(tickUpMove);
                minusDM.push(0);
            } else if (tickDownMove > tickUpMove && tickDownMove > 0) {
                plusDM.push(0);
                minusDM.push(tickDownMove);
            } else {
                plusDM.push(0);
                minusDM.push(0);
            }
            
            if (tr.length < period) return 25;
            
            let smoothedTR = 0, smoothedPlusDM = 0, smoothedMinusDM = 0;
            const startIdx = tr.length - period;
            
            for (let i = startIdx; i < tr.length; i++) {
                smoothedTR += tr[i];
                smoothedPlusDM += plusDM[i];
                smoothedMinusDM += minusDM[i];
            }
            
            smoothedTR /= period;
            smoothedPlusDM /= period;
            smoothedMinusDM /= period;
            
            const plusDI = (smoothedPlusDM / smoothedTR) * 100;
            const minusDI = (smoothedMinusDM / smoothedTR) * 100;
            const diSum = plusDI + minusDI;
            const diDiff = Math.abs(plusDI - minusDI);
            const dx = diSum === 0 ? 0 : (diDiff / diSum) * 100;
            
            updateDIValues(plusDI, minusDI);
            
            cachedADX = Math.min(100, Math.max(0, isNaN(dx) ? 25 : dx));
            lastADXCalc = now;
            return cachedADX;
        } catch (error) { console.error("ADX Error:", error); return 25; }
    }
    
    function computeRSI(currentPrice) {
        if (!candleData.length || candleData.length < 20) return 50;
        
        const period = 14;
        let closes = candleData.map(c => c.c);
        
        if (closes.length > 0 && currentPrice !== closes[closes.length - 1]) {
            closes.push(currentPrice);
        }
        
        if (closes.length < period + 1) return 50;
        
        let gains = [], losses = [];
        
        for (let i = 1; i < closes.length; i++) {
            const diff = closes[i] - closes[i - 1];
            if (diff >= 0) {
                gains.push(diff);
                losses.push(0);
            } else {
                gains.push(0);
                losses.push(Math.abs(diff));
            }
        }
        
        let avgGain = 0, avgLoss = 0;
        
        for (let i = 0; i < period; i++) {
            avgGain += gains[i];
            avgLoss += losses[i];
        }
        
        avgGain /= period;
        avgLoss /= period;
        
        for (let i = period; i < gains.length; i++) {
            avgGain = ((avgGain * (period - 1)) + gains[i]) / period;
            avgLoss = ((avgLoss * (period - 1)) + losses[i]) / period;
        }
        
        if (avgLoss === 0) return 100;
        const rs = avgGain / avgLoss;
        return Math.min(100, Math.max(0, 100 - (100 / (1 + rs))));
    }
    
    function calculateEMA34() {
        if (!candleData.length || candleData.length < 34) return null;
        const period = 34;
        const multiplier = 2 / (period + 1);
        let ema = candleData[0].c;
        for (let i = 1; i < candleData.length; i++) {
            ema = (candleData[i].c - ema) * multiplier + ema;
        }
        return ema;
    }

            engine.bosConfirmed = true; engine.bias = "BULLISH_BOS"; engine.lastBosTime = now;

            engine.lastSwingHigh = engine.swingHigh; engine.lastSwingLow = engine.swingLow;

    async function fetchMTFData() {
        const timeframes = ['5m', '15m', '1h'];
        for (const tf of timeframes) {
            try {
                const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${tf}&limit=100`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (Array.isArray(data) && data.length > 0) {
                    const tfData = data.map(d => ({ h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4]) }));
                    const lastPriceMTF = tfData[tfData.length - 1].c;
                    const swingPoints = detectSwingPointsWithMinRange(tfData, getFractalLookback());
                    const bias = lastPriceMTF > (swingPoints.swingHigh + swingPoints.swingLow) / 2 ? "BULLISH" : "BEARISH";
                    
                    if (tf === '5m') mtfBiasCache.m5 = bias;
                    else if (tf === '15m') mtfBiasCache.m15 = bias;
                    else if (tf === '1h') mtfBiasCache.h1 = bias;
                }
            } catch (err) {
                console.warn(`MTF fetch error for ${tf}:`, err);
            }
        }
        updateMTFPargraph();
    }

    function calculateSMCLevels() {
        if (!candleData.length || candleData.length < 30) return;
        
        const lookback = getLookback();
        const fractalLookback = getFractalLookback();
        
        const slice = candleData.slice(-Math.min(candleData.length, lookback));
        const swingPoints = detectSwingPointsWithMinRange(slice, fractalLookback);
        
        let swingHigh = swingPoints.swingHigh;
        let swingLow = swingPoints.swingLow;
        
        const lastCandle = candleData[candleData.length - 1];
        const currentPrice = lastPrice > 0 ? lastPrice : lastCandle.c;
        const range = swingHigh - swingLow;
        
        if (range <= 0) return;
        
        engine.swingHigh = swingHigh;
        engine.swingLow = swingLow;
        resetSweepIfStructureChanged();
        
        if (!engine.bosConfirmed) { 
            engine.bias = currentPrice > (swingHigh + swingLow) / 2 ? "BULLISH" : "BEARISH"; 
        }
        
        const isBullish = engine.bosConfirmed ? engine.bias === "BULLISH_BOS" : engine.bias === "BULLISH";
        
        if (isBullish) {
            engine.f618 = swingLow + (range * 0.618);
            engine.deep = swingLow + (range * 0.79);
            engine.tp = swingHigh + (range * 0.21);
        } else {
            engine.f618 = swingHigh - (range * 0.618);
            engine.deep = swingHigh - (range * 0.79);
            engine.tp = swingLow - (range * 0.21);
        }
        
        updateSwingUI(); 
        updateFinalDecision();
    }

            updateUIElements(currentPrice);
            updateFinalDecision();
            lastUIElementsUpdate = now;
        }
        
        updateSwingUI();
        checkTPHit(currentPrice);
        checkAndUpdateStructure(currentPrice);
        
        lastPrice = currentPrice;
    }
    
    async function fetchKlines() {
        try {
            const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${currentPair}&interval=${currentTF}&limit=250`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (!Array.isArray(data)) throw new Error("Invalid data");
            candleData = data.map(d => ({ o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4]), t: d[0] }));
            calculateSMCLevels(); 
            if (candleData.length) updateUI(candleData[candleData.length - 1].c);
            return true;
        } catch (err) { console.error("Fetch error:", err); return false; }
    }
    
    function initWebSocket() {
        cleanupWebSocket();
        updateWSStatus('connecting', 'CONNECTING');
        
        const wsUrl = `wss://fstream.binance.com/ws/${currentPair.toLowerCase()}@aggTrade`;
        wsConnection = new WebSocket(wsUrl);
        
        wsConnection.onopen = () => {
            console.log(`✅ WebSocket connected: ${currentPair}`);
            reconnectDelay = 1000;
            lastWSMessageTime = Date.now();
            updateWSStatus('live', 'LIVE');
        };
        
        wsConnection.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.p && !isReloading) {
                    const tradePrice = parseFloat(msg.p);
                    lastWSMessageTime = Date.now();
                    calculateSMCLevels(); 
                    detectLiquiditySweep(tradePrice); 
                    confirmBOS(tradePrice); 
                    updateUI(tradePrice);
                    updateDXYFromPrice(tradePrice);
                }
            } catch (err) { console.warn("WS message error:", err); }
        };
        
        wsConnection.onclose = (event) => {
            console.log(`WebSocket closed: ${currentPair}, code: ${event.code}`);
            if (!isManualDisconnect && !isReloading) {
                updateWSStatus('reconnect', 'RECONNECT');
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    if (!isReloading && !isManualDisconnect) {
                        reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
                        initWebSocket();
                    }
                }, reconnectDelay);
            }
        };
        
        wsConnection.onerror = (error) => {
            console.warn(`WebSocket error: ${currentPair}`, error);
            if (!isManualDisconnect && !isReloading) updateWSStatus('reconnect', 'ERROR');
        };
    }
    
    function startPeriodicUpdates() { 
        if (periodicInterval) clearInterval(periodicInterval); 
        periodicInterval = setInterval(() => { 
            if (lastPrice > 0 && !isReloading && candleData.length > 0) { 
                calculateSMCLevels(); 
                updateUI(lastPrice); 
                updateDXYFromPrice(lastPrice);
            } 
        }, 500); 
    }
    
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
            if (wsConnection && wsConnection.readyState === WebSocket.OPEN) {
                try {
                    wsConnection.send(JSON.stringify({ method: "ping" }));
                } catch(e) {}
            }
        }, 30000);
    }
    
    function startStuckChecker() { 
        if (stuckCheckInterval) clearInterval(stuckCheckInterval); 
        stuckCheckInterval = setInterval(() => { 
            if (wsConnection && wsConnection.readyState !== WebSocket.OPEN && !isReloading && !isManualDisconnect) {
                updateWSStatus('reconnect', 'RECONNECT');
            }
        }, 5000); 
    }
    
    window.smartCopy = function(id) {
        let textToCopy = "";
        if (id === 'mtf-paragraph') { 
            const mtfElem = document.getElementById('mtf-paragraph-text'); 
            if (mtfElem) textToCopy = mtfElem.innerText; 
        }
        else if (id === 'entry-zone') {
            const r618 = document.getElementById('r618');
            const r79 = document.getElementById('r79');
            if (r618 && r79) textToCopy = `Entry 0.618: ${r618.innerText} | Entry 0.79: ${r79.innerText}`;
        }
        else if (id === 'swing-high-value') {
            const swingHighVal = document.getElementById('swing-high-value');
            if (swingHighVal) textToCopy = swingHighVal.innerText;
        }
        else if (id === 'swing-low-value') {
            const swingLowVal = document.getElementById('swing-low-value');
            if (swingLowVal) textToCopy = swingLowVal.innerText;
        }
        else if (id === 'rTP') {
            const tpVal = document.getElementById('rTP');
            if (tpVal) textToCopy = tpVal.innerText;
        }
        else if (id === 'live-price') {
            const priceElem = document.getElementById('live-price');
            if (priceElem) textToCopy = priceElem.innerText;
        }
        else { 
            const el = document.getElementById(id); 
            if (el) textToCopy = el.innerText; 
        }
        if (!textToCopy) return;
        navigator.clipboard.writeText(textToCopy);
        const targetElem = document.getElementById(id);
        if (targetElem) { 
            targetElem.classList.add('copied'); 
            setTimeout(() => targetElem.classList.remove('copied'), 300); 
        }
    };
    
    function updateClockAndSession() {
        const now = new Date(); 
        const hours = now.getHours();
        const clockElem = document.getElementById('clock-module-new');
        const dateElem = document.getElementById('date-display-new');
        const sessionElem = document.getElementById('session-tag-new');
        if (clockElem) clockElem.innerText = now.toLocaleTimeString('id-ID');
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = String(now.getFullYear()).slice(-2);
        if (dateElem) dateElem.innerText = `${day}/${month}/${year}`;
        let session = "NY_VOL"; 
        if (hours >= 7 && hours < 14) session = "ASIA"; 
        else if (hours >= 14 && hours < 20) session = "LONDON";
        if (sessionElem) sessionElem.innerText = session;
    }
    
    function disableButtons(disabled) {
        document.querySelectorAll('.btn-tab').forEach(btn => {
            if (disabled) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });
    }
    
    async function fullReload() {
        if (isReloading) return;
        isReloading = true;
        disableButtons(true);
        document.getElementById('main-terminal')?.classList.add('syncing');
        
        stopAllIntervals();
        cleanupWebSocket();
        
        engine.sweepDetected = false; 
        engine.bosConfirmed = false; 
        engine.liquiditySide = null; 
        engine.fvgEntryActive = false;
        recentPrices = [];
        
        lastSignalExpiry = 0;
        lastSignalDecision = "";
        
        updateFinalDecision();
        updateWSStatus('connecting', 'LOADING');
        
        await fetchKlines();
        await fetchMTFData();
        
        initWebSocket();
        startPeriodicUpdates();
        startStuckChecker();
        startHeartbeat();
        startRestForceRefresh();
        
        setInterval(fetchMTFData, 60000);
        
        document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
        const pairBtn = document.getElementById(`btn-${currentPair}`);
        const tfBtn = document.getElementById(`tf-${currentTF}`);
        if (pairBtn) pairBtn.classList.add('active');
        if (tfBtn) tfBtn.classList.add('active');
        
        // Langsung hilangkan efek syncing tanpa delay
        document.getElementById('main-terminal')?.classList.remove('syncing');
        disableButtons(false);
        isReloading = false;
    }
    
    document.querySelectorAll('[data-pair]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentPair === btn.dataset.pair || isReloading) return; 
            currentPair = btn.dataset.pair; 
            localStorage.setItem('lastPair', currentPair); 
            fullReload(); 
        }; 
    });
    
    document.querySelectorAll('[data-tf]').forEach(btn => { 
        btn.onclick = () => { 
            if (currentTF === btn.dataset.tf || isReloading) return; 
            currentTF = btn.dataset.tf; 
            localStorage.setItem('lastTF', currentTF); 
            fullReload(); 
        }; 
    });
    
    setInterval(updateClockAndSession, 1000);
    fullReload();
</script>
